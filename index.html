  background: radial-gradient(circle at center, #660000 0%, #1a0000 40%, #000000 100%);
  background-size: 200% 200%;
  animation: bloodFlow 8s ease-in-out infinite;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;

  100% {

  color: white;
  text-decoration: none;
  font-size: 2rem;
  transition: all 0.25s ease;
}

a:visited {
  color: white;
  text-decoration: none;
}

a:hover {
  transform: scale(1.05);
  color: black;
  background: red;
  padding: 10px 20px;
  border-radius: 10px;
}
