<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SunTzv OS</title>

<style>
body {
  margin: 0;
  background: #008080; /* classic Win95 teal */
  font-family: "MS Sans Serif", sans-serif;
  overflow: hidden;
}

/* Desktop */
.desktop {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* Window */
.window {
  width: 500px;
  background: #c0c0c0;
  border: 2px solid #fff;
  border-right-color: #000;
  border-bottom-color: #000;
  box-shadow: inset -2px -2px #808080, inset 2px 2px #dfdfdf;
  position: absolute;
  top: 20%;
  left: 30%;
}

/* Title bar */
.title-bar {
  background: linear-gradient(to right, navy, #000080);
  color: white;
  padding: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

/* Buttons */
.buttons span {
  background: #c0c0c0;
  border: 2px solid #fff;
  border-right-color: #000;
  border-bottom-color: #000;
  padding: 0 6px;
  margin-left: 2px;
  cursor: pointer;
}

/* Content area */
.content {
  padding: 20px;
  background: black;
  height: 200px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Inner SunTzv page */
a {
  color: red;
  text-decoration: none;
  font-size: 20px;
}

a:visited {
  color: red;
}

a:hover {
  background: red;
  color: black;
  padding: 5px 10px;
}

/* Taskbar */
.taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #c0c0c0;
  border-top: 2px solid #fff;
  display: flex;
  align-items: center;
  height: 40px;
}

.start {
  margin-left: 5px;
  padding: 5px 10px;
  border: 2px solid #fff;
  border-right-color: #000;
  border-bottom-color: #000;
  background: #c0c0c0;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="desktop">

  <!-- Window -->
  <div class="window">
    <div class="title-bar">
      <span>Internet Explorer - SunTzv</span>
      <div class="buttons">
        <span>_</span>
        <span>□</span>
        <span>✕</span>
      </div>
    </div>

    <div class="content">
      <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
        SunTzu was taken so SunTzv
      </a>
    </div>
  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <div class="start">Start</div>
  </div>

</div>

</body>
</html>
