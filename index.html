  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 2rem;
  transition: all 0.3s ease;

a:visited {
  color: white;
  text-decoration: none;
}

a:hover {
  transform: scale(1.03);
  color: black;
  background: gold;
  padding: 10px 20px;
  border-radius: 10px;
